name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Targeted smoke tests
        run: python -m unittest -v tests.test_app_shell tests.test_app_shell_dashboard tests.test_release_builder tests.test_release_checklist tests.test_readme_usage tests.test_cli tests.test_package_diagnostics

      - name: Release checklist smoke
        run: python -m tron_roll_call_hero.tron release-check --json

      - name: Release build dry run
        run: python -m tron_roll_call_hero.tron release-build --dry-run --json

      - name: Full unittest suite
        run: python -m unittest discover -v
